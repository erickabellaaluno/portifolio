services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dev
      POSTGRES_USER: api
      POSTGRES_PASSWORD: api-pwd
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

volumes:
  database_data:
